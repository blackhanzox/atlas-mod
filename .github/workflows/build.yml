name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison ccache cpio flex kmod libelf-dev libssl-dev python3 python3-pip rsync zip zstd

      - name: Download Neutron-Clang toolchain
        run: |
          mkdir -p toolchain
          wget -q https://github.com/Neutron-Toolchains/antman/raw/main/antman
          chmod +x antman
          ./antman -S=05012024
          ./antman --patch=glibc

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: kernel-${{ github.sha }}

      - name: Build kernel
        run: |
          export PATH="$(pwd)/toolchain/neutron-clang/bin:$PATH"
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          make ARCH=arm64 exynos850-a21snsxx_defconfig
          make -j$(nproc) ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip 2>&1 | tee build.log

      - name: Package AnyKernel3 zip
        run: |
          git clone --depth=1 https://github.com/Kernel-SU/AnyKernel3 -b master anykernel
          cp arch/arm64/boot/Image anykernel/ 2>/dev/null || true
          cp arch/arm64/boot/dts/exynos/*.dtb anykernel/dtb 2>/dev/null || true
          cp build.log anykernel/ 2>/dev/null || true
          cd anykernel
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's/do.modules=1/do.modules=0/g' anykernel.sh
          sed -i 's/do.cleanup=1/do.cleanup=0/g' anykernel.sh
          zip -r9 ../atlas-mod-kernel-$(date +%Y%m%d-%H%M).zip * -x .git README.md

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: atlas-mod-kernel
          path: ./*.zip
