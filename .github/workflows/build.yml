name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison cpio flex kmod libelf-dev libssl-dev python3 python3-pip rsync zip zstd ccache binutils-aarch64-linux-gnu

      - name: Setup AOSP Clang
        run: |
          mkdir -p toolchain
          cd toolchain
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r522817.tar.gz
          tar -xf clang-r522817.tar.gz 2>/dev/null
          rm -f clang-r522817.tar.gz
          cd ..

      - name: Build kernel
        run: |
          export PATH="/usr/lib/ccache:$(pwd)/toolchain/bin:$PATH"
          export CCACHE_DIR="$HOME/.ccache"
          ccache -M 2G
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          make mrproper 2>/dev/null || true
          make ARCH=arm64 exynos850-a21snsxx_defconfig
          make -j$(nproc) ARCH=arm64 2>&1 | tee build.log

      - name: Package flashable zip
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel
          gzip -f -9 arch/arm64/boot/Image
          cp arch/arm64/boot/Image.gz anykernel/
          find arch/arm64/boot/dts -name "*.dtb" -exec cat {} + > anykernel/dtb 2>/dev/null
          cp build.log anykernel/
          cd anykernel
          sed -i 's|ash anykernel.sh|sh anykernel.sh|g' tools/ak3-core.sh
          rm -f anykernel.sh
          echo 'properties() {' > anykernel.sh
          echo 'kernel.string=Atlas Kernel by BlackHanzoX (@BlackHanzoX)' >> anykernel.sh
          echo 'do.devicecheck=1' >> anykernel.sh
          echo 'do.modules=0' >> anykernel.sh
          echo 'do.systemless=1' >> anykernel.sh
          echo 'do.cleanup=1' >> anykernel.sh
          echo 'do.cleanuponabort=0' >> anykernel.sh
          echo 'device.name1=a21s' >> anykernel.sh
          echo "'; }" >> anykernel.sh
          echo 'BLOCK=/dev/block/by-name/boot;' >> anykernel.sh
          echo 'IS_SLOT_DEVICE=0;' >> anykernel.sh
          echo 'RAMDISK_COMPRESSION=auto;' >> anykernel.sh
          echo 'PATCH_VBMETA_FLAG=auto;' >> anykernel.sh
          echo '. tools/ak3-core.sh;' >> anykernel.sh
          echo 'split_boot;' >> anykernel.sh
          echo 'flash_boot;' >> anykernel.sh
          rm -f ramdisk/placeholder patch/placeholder modules/system/lib/modules/placeholder
          zip -r9 ../atlas-mod-kernel-$(date +%Y%m%d-%H%M).zip * -x .git README.md
          cd ..

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: atlas-mod-kernel
          path: ./*.zip
