name: Build Kernel

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison ccache cpio flex kmod libelf-dev libssl-dev python3 python3-pip rsync zip zstd

      - name: Download toolchain
        run: |
          mkdir -p toolchain
          wget -q https://github.com/Neutron-Toolchains/antman/raw/main/antman
          chmod +x antman
          ./antman -S=05012024
          ./antman --patch=glibc

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: kernel-${{ github.sha }}

      - name: Build kernel
        run: |
          export PATH="$(pwd)/toolchain/neutron-clang/bin:$PATH"
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          make ARCH=arm64 exynos850-a21snsxx_defconfig
          make -j$(nproc) ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip 2>&1 | tee build.log

      - name: Package artifacts
        run: |
          mkdir -p out
          cp arch/arm64/boot/Image out/ 2>/dev/null || true
          cp arch/arm64/boot/dts/exynos/*.dtb out/ 2>/dev/null || true
          cp vmlinux out/ 2>/dev/null || true
          cp System.map out/ 2>/dev/null || true
          cp build.log out/ 2>/dev/null || true
          echo "KALLSYMS enabled: \$(grep CONFIG_KALLSYMS .config)" >> out/build-info.txt
          echo "Build date: \$(date)" >> out/build-info.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts
          path: out/
