name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison cpio flex kmod libelf-dev libssl-dev python3 python3-pip rsync zip zstd ccache binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu

      - name: Setup AOSP Clang
        run: |
          mkdir -p toolchain
          cd toolchain
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r522817.tar.gz
          tar -xf clang-r522817.tar.gz 2>/dev/null
          rm -f clang-r522817.tar.gz
          ls -la bin/
          cd ..

      - name: Build kernel
        run: |
          export PATH="/usr/lib/ccache:$(pwd)/toolchain/bin:$PATH"
          export CCACHE_DIR="$HOME/.ccache"
          ccache -M 2G
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          make mrproper
          make ARCH=arm64 exynos850-a21snsxx_defconfig
          make -j$(nproc) ARCH=arm64 2>&1 | tee build.log

      - name: Verify KALLSYMS
        run: |
          echo "=== .config ==="
          grep "CONFIG_KALLSYMS" .config
          echo ""
          echo "=== Verificando Image ==="
          strings arch/arm64/boot/Image | grep -q "kallsyms_lookup" && echo "✅ KALLSYMS ACTIVO" || echo "❌ KALLSYMS NO ENCONTRADO"

      - name: Package flashable zip
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel
          cp arch/arm64/boot/Image anykernel/
          find arch/arm64/boot/dts -name "*.dtb" -exec cat {} + > anykernel/dtb 2>/dev/null
          cp build.log anykernel/
          cd anykernel
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's/do.modules=1/do.modules=0/g' anykernel.sh
          sed -i 's/do.cleanup=1/do.cleanup=0/g' anykernel.sh
          sed -i 's|block=/dev/block/bootdevice/by-name/boot|block=/dev/block/mmcblk0p18|g' anykernel.sh
          sed -i 's|ash anykernel.sh|sh anykernel.sh|g' tools/ak3-core.sh
          zip -r9 ../kernel-$(date +%Y%m%d-%H%M).zip * -x .git README.md
          cd ..

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: ./*.zip
